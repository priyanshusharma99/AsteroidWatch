<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsteroidWatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AsteroidWatch</h1>
        <p>Keep an eye on Near-Earth Objects.</p>
    </header>
    
    <main>
        <section id="data-container">
            <p>Welcome to AsteroidWatch! Data visualization coming soon.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AsteroidWatch Project</p>
    </footer>

    <script>
        fetch("https://api.nasa.gov/neo/rest/v1/feed?api_key=QYGRupebWsaJ9U0hmSKHvgahKNd5uUgkOKuWexcK")
            .then(res => res.json())
            .then(data => {
                const dates = Object.keys(data.near_earth_objects);
                const firstDateObjects = data.near_earth_objects[dates[0]];
                let html = "<ul>";
                for (let i = 0; i < firstDateObjects.length; i++) {
                    const obj = firstDateObjects[i];
                    html += `<li>${obj.name} (Hazardous: ${obj.is_potentially_hazardous_asteroid})</li>`;
                }
                html += "</ul>";
                document.getElementById("data-container").innerHTML = html;
            });
    </script>
</body>
</html>
