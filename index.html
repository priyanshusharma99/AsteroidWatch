<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsteroidWatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AsteroidWatch</h1>
        <p>Keep an eye on Near-Earth Objects.</p>
        <button id="theme-toggle">Toggle Light Mode</button>
    </header>
    
    <main>
        <div class="date">
            <h1>Start Date</h1>
            <input type="number" id="day" placeholder="DD" min="1" max="31" />
<input type="number" id="month" placeholder="MM" min="1" max="12" />
<input type="number" id="year" placeholder="YYYY" min="2000" max="2050" />
            <h1>End Date</h1>
            <input type="number" id="day" placeholder="DD" min="1" max="31" />
<input type="number" id="month" placeholder="MM" min="1" max="12" />
<input type="number" id="year" placeholder="YYYY" min="2000" max="2050" />
            <button class="getall">
                Go
            </button>
        </div>
        <div id="controls">
            <input type="text" id="search-input" placeholder="Search by name...">
            <select id="filter-select">
                <option value="all">All Asteroids</option>
                <option value="hazardous">Hazardous Only</option>
                <option value="safe">Safe Only</option>
            </select>
            <select id="sort-select">
                <option value="name">Sort by Name</option>
                <option value="size">Sort by Size (Large-Small)</option>
                <option value="speed">Sort by Speed (Fast-Slow)</option>
            </select>
        </div>

        <section id="data-container">
            <div class="data">

                <div class="neo-card"></div>
            </div>
        </section>
        <button class="get">Get Data</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
